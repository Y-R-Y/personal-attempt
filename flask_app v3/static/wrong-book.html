<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>错题本 - 小学刷题乐园</title>
    <style id="critical-layout">:root{--sidebar-width:240px}body{margin:0;min-height:100vh;background:#f0f4ff}.app-container{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh;width:100%}.sidebar{width:100%;position:sticky;top:0;height:100vh;z-index:100}@media(max-width:1024px){.app-container{grid-template-columns:1fr;grid-template-rows:auto 1fr}.sidebar{height:auto}}.retry-btn{padding:10px 22px;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:0.95rem;font-weight:700;box-shadow:0 3px 12px rgba(245,158,11,0.25);transition:all .18s}.retry-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,158,11,0.35)}.retry-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}.prac-option-btn{padding:14px 18px;border-radius:12px;border:2px solid #e0e7ff;background:#f5f3ff;cursor:pointer;font-size:1rem;font-weight:500;color:#4338ca;transition:all .18s;text-align:left}.prac-option-btn:hover{border-color:#6366f1;background:#eef2ff}.prac-option-btn.selected{border-color:#6366f1;background:#6366f1;color:#fff}.prac-option-btn.correct{border-color:#22c55e;background:#f0fdf4;color:#16a34a}.prac-option-btn.wrong{border-color:#ef4444;background:#fef2f2;color:#dc2626}.prac-option-btn:disabled{pointer-events:none}.subject-pick-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .2s ease}.subject-pick-dialog{background:#fff;border-radius:20px;padding:32px 28px;width:90%;max-width:420px;box-shadow:0 16px 48px rgba(0,0,0,.15);animation:scaleIn .25s ease}.subject-pick-title{font-size:1.25rem;font-weight:700;color:#1e1b4b;margin:0 0 6px;text-align:center}.subject-pick-subtitle{font-size:.9rem;color:#9ca3af;margin:0 0 24px;text-align:center}.subject-pick-list{display:flex;flex-direction:column;gap:10px}.subject-pick-item{padding:14px 18px;border-radius:14px;border:2px solid #e5e7eb;background:#fafbff;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}.subject-pick-item:hover{border-color:#6366f1;background:#eef2ff}.subject-pick-item .sp-name{font-size:1rem;font-weight:600;color:#1e1b4b}.subject-pick-item .sp-count{font-size:.9rem;color:#6366f1;font-weight:600;background:#eef2ff;padding:4px 12px;border-radius:20px}.subject-pick-item.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}.subject-pick-cancel{margin-top:20px;width:100%;padding:12px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;cursor:pointer;font-size:.95rem;color:#6b7280;font-weight:600;transition:all .18s}.subject-pick-cancel:hover{background:#f3f4f6}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}</style>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <!-- 成就提示弹窗 -->
    <div id="achievement-toast" class="achievement-toast">
        <div class="achievement-toast-icon" id="achievement-toast-icon">🌟</div>
        <div class="achievement-toast-content">
            <div class="achievement-toast-title">🎉 成就解锁</div>
            <div class="achievement-toast-name" id="achievement-toast-name">新手上路</div>
            <div class="achievement-toast-desc" id="achievement-toast-desc">完成第一次答题</div>
        </div>
    </div>
    
    <div class="app-container">
        <!-- 侧边栏导航 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🎓 刷题乐园</h1>
                <p class="subtitle">趣味闯关 · 快乐学习</p>
            </div>
            
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item">
                    <span class="menu-item-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="level.html?subject=math" class="menu-item">
                    <span class="menu-item-icon">🔢</span>
                    <span>数学</span>
                </a>
                <a href="level.html?subject=chinese" class="menu-item">
                    <span class="menu-item-icon">📖</span>
                    <span>语文</span>
                </a>
                <a href="level.html?subject=english" class="menu-item">
                    <span class="menu-item-icon">🔤</span>
                    <span>英语</span>
                </a>
                <a href="level.html?subject=science" class="menu-item">
                    <span class="menu-item-icon">🔬</span>
                    <span>科学</span>
                </a>
                <a href="level.html?subject=history" class="menu-item">
                    <span class="menu-item-icon">📜</span>
                    <span>历史</span>
                </a>
                <a href="leaderboard.html" class="menu-item">
                    <span class="menu-item-icon">🏆</span>
                    <span>排行榜</span>
                </a>
                <a href="wrong-book.html" class="menu-item active">
                    <span class="menu-item-icon">📝</span>
                    <span>错题本</span>
                </a>
                <a href="achievements.html" class="menu-item">
                    <span class="menu-item-icon">🏆</span>
                    <span>成就榜</span>
                </a>
                <a href="ai-assistant.html" class="menu-item">
                    <span class="menu-item-icon">🤖</span>
                    <span>AI学习助手</span>
                </a>
                <a href="vip.html" class="menu-item">
                    <span class="menu-item-icon">👑</span>
                    <span>VIP会员</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="profile.html" class="menu-item" style="margin-bottom: 15px;">
                    <span class="menu-item-icon">👤</span>
                    <span>我的</span>
                </a>
                <button class="logout-btn" id="logout-btn" onclick="logout()" style="display:none;">🚪 退出登录</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="header">
                <h1>📝 错题本</h1>
                <p class="subtitle">查看错题，巩固薄弱点</p>
                <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                    <button id="refresh-wrong-btn" class="refresh-btn">
                        🔄 刷新错题
                    </button>
                    <button id="retry-wrong-btn" class="retry-btn" onclick="openSubjectPick()">
                        🎯 错题再练
                    </button>
                </div>
            </div>
            
            <div class="wrong-book-container">
                <!-- 科目筛选器 -->
                <div class="wrong-filters" id="wrong-filters">
                    <button class="filter-btn active" data-subject="all">全部</button>
                    <button class="filter-btn" data-subject="math">数学</button>
                    <button class="filter-btn" data-subject="chinese">语文</button>
                    <button class="filter-btn" data-subject="english">英语</button>
                    <button class="filter-btn" data-subject="science">科学</button>
                    <button class="filter-btn" data-subject="history">历史</button>
                </div>
                
                <div id="wrong-book-list" class="wrong-list">
                    <!-- 错题将通过JavaScript动态生成 -->
                </div>
                
                <!-- 错题再练区域 -->
                <div id="practice-area" style="display:none;">
                    <div style="background:#fff;border-radius:20px;padding:32px 28px;box-shadow:0 4px 24px rgba(99,102,241,0.08);">
                        <!-- 进度条 -->
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                            <span style="font-weight:600;color:#1e1b4b;font-size:1.05rem;">
                                第 <span id="prac-current">1</span> / <span id="prac-total">5</span> 题
                            </span>
                            <span style="font-size:0.9rem;color:#9ca3af;" id="prac-subject"></span>
                        </div>
                        <div style="height:6px;background:#e5e7eb;border-radius:3px;margin-bottom:28px;overflow:hidden;">
                            <div id="prac-progress" style="height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:3px;width:0%;transition:width .3s;"></div>
                        </div>
                        
                        <!-- 题目 -->
                        <div id="prac-question-text" style="font-size:1.15rem;color:#1e1b4b;font-weight:600;margin-bottom:24px;line-height:1.7;"></div>
                        
                        <!-- 选项 -->
                        <div id="prac-options" style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px;"></div>
                        
                        <!-- 反馈 -->
                        <div id="prac-feedback" style="display:none;padding:14px 18px;border-radius:12px;margin-bottom:16px;font-weight:600;font-size:0.95rem;"></div>
                        
                        <!-- 按钮区 -->
                        <div style="display:flex;gap:12px;">
                            <button id="prac-next-btn" onclick="nextPracticeQuestion()" style="display:none;flex:1;padding:14px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:1rem;font-weight:700;">
                                下一题 →
                            </button>
                        </div>
                    </div>
                    
                    <!-- 练习结果 -->
                    <div id="prac-result" style="display:none;text-align:center;padding:40px 20px;">
                        <div style="font-size:4rem;" id="prac-result-icon"></div>
                        <h2 style="color:#1e1b4b;margin:12px 0 4px;" id="prac-result-title"></h2>
                        <p style="color:#6b7280;margin:0 0 8px;" id="prac-result-detail"></p>
                        <p style="color:#818cf8;margin:0 0 24px;font-size:0.9rem;" id="prac-result-removed"></p>
                        <button onclick="backToWrongList()" style="padding:12px 32px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:1rem;font-weight:600;">
                            ← 返回错题本
                        </button>
                    </div>
                </div>
                <button type="button" class="clear-btn" id="clear-wrong-btn" onclick="clearWrongBook()" style="display:none;">
                    🗑️ 清空错题本
                </button>
            </div>
        </main>
    </div>

    <script>window.__customPageInit = true;</script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    
    <!-- 学科选择弹窗 -->
    <div id="subject-pick-overlay" class="subject-pick-overlay" style="display:none;">
        <div class="subject-pick-dialog">
            <h3 class="subject-pick-title">📚 选择再练学科</h3>
            <p class="subject-pick-subtitle">选择一个学科，仅练习该学科的错题</p>
            <div class="subject-pick-list" id="subject-pick-list">
                <!-- 动态生成 -->
            </div>
            <button class="subject-pick-cancel" onclick="closeSubjectPick()">取消</button>
        </div>
    </div>

    <script>
        window.addEventListener('load', async function() {
            await initApp();
            await loadWrongBook();
        });
        
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && (appState.userId || getCurrentUserId())) {
                loadWrongBook();
            }
        });
        
        window.addEventListener('focus', function() {
            if (appState.userId || getCurrentUserId()) {
                loadWrongBook();
            }
        });
    </script>
</body>
</html>
