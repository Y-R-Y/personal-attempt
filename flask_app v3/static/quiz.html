<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>答题 - 小学刷题乐园</title>
    <style id="critical-layout">:root{--sidebar-width:240px}body{margin:0;min-height:100vh;background:#f0f4ff}.app-container{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh;width:100%}.sidebar{width:100%;position:sticky;top:0;height:100vh;z-index:100}@media(max-width:1024px){.app-container{grid-template-columns:1fr;grid-template-rows:auto 1fr}.sidebar{height:auto}}</style>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <!-- 成就提示弹窗 -->
    <div id="achievement-toast" class="achievement-toast">
        <div class="achievement-toast-icon" id="achievement-toast-icon">🌟</div>
        <div class="achievement-toast-content">
            <div class="achievement-toast-title">🎉 成就解锁</div>
            <div class="achievement-toast-name" id="achievement-toast-name">新手上路</div>
            <div class="achievement-toast-desc" id="achievement-toast-desc">完成第一次答题</div>
        </div>
    </div>
    
    <!-- 返回确认弹窗 -->
    <div class="modal" id="back-confirm-modal" style="display:none;">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-body" style="text-align:center; padding: 48px 32px 32px;">
                <div style="font-size: 56px; margin-bottom: 20px;">⚠️</div>
                <div style="font-size: 18px; font-weight: 600; color: #2d3748; margin-bottom: 10px;">确定要返回吗？</div>
                <div style="font-size: 14px; color: #94a3b8; line-height: 1.6;">返回后不保存当前做题记录</div>
            </div>
            <div class="modal-footer modal-footer-center">
                <button class="modal-btn modal-btn-cancel" onclick="hideBackConfirmModal()">继续答题</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmGoBack()">确认返回</button>
            </div>
        </div>
    </div>
    
    <div class="app-container">
        <!-- 侧边栏导航 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🎓 刷题乐园</h1>
                <p class="subtitle">趣味闯关 · 快乐学习</p>
            </div>
            
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item">
                    <span class="menu-item-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="#" class="menu-item active" onclick="return false;">
                    <span class="menu-item-icon">📝</span>
                    <span>答题中</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="profile.html" class="menu-item" style="margin-bottom: 15px;">
                    <span class="menu-item-icon">👤</span>
                    <span>我的</span>
                </a>
                <button class="logout-btn" id="logout-btn" onclick="logout()" style="display:none;">🚪 退出登录</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="quiz-header">
                <button class="quiz-back-btn" onclick="goBackFromQuiz()" title="返回不保存做题记录">
                    ← 返回
                </button>
                <div class="progress-info">
                    <span>第 <span id="current-question">1</span> / <span id="total-questions-quiz">10</span> 题</span>
                    <span>⏱️ <span id="timer">00:00</span></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div class="question-card">
                <div class="question-type" id="question-type">选择题</div>
                <div class="question-text" id="question-text">题目内容加载中...</div>
                
                <div class="options-container" id="options-container">
                    <!-- 选项将动态生成 -->
                </div>

                <div class="input-container" id="input-container" style="display:none;">
                    <input type="text" id="answer-input" placeholder="输入你的答案" class="answer-input">
                    <button class="submit-btn" onclick="submitAnswer()">提交答案</button>
                </div>
                
                <div class="click-hint" id="click-hint" style="text-align:center; color:#999; font-size:16px; margin-top:20px;">
                    👆 点击选项即可答题
                </div>
            </div>

            <div class="feedback" id="feedback"></div>

            <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none;">
                下一题 →
            </button>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        // 初始化页面
        window.onload = function() {
            initApp();
                    
            // 检查登录状态
            if (!isLoggedIn()) {
                showLoginRequiredModal();
                return;
            }
                    
            // 从 URL参数获取科目和关卡
            const urlParams = new URLSearchParams(window.location.search);
            appState.currentSubject = urlParams.get('subject') || 'math';
            appState.currentLevel = parseInt(urlParams.get('level')) || 1;
                    
            // 自动开始答题
            startLevel(appState.currentLevel);
        };
    </script>
</body>
</html>
