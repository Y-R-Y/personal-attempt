            <nav class="sidebar-menu">

                <button class="logout-btn" id="logout-btn" onclick="logout()" style="display:none;">🚪 退出登录</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="header">
                <button class="back-btn" onclick="window.location.href='profile.html'" title="返回个人中心">
                    ← 返回
                </button>
                <h1>🔒 账号安全</h1>
                <p class="subtitle">管理你的账号安全设置</p>
            </div>
            
            <div class="security-container">
                <!-- 修改密码卡片 -->
                <div class="security-card">
                    <h2 class="security-card-title">🔑 修改密码</h2>
                    <p class="security-card-desc">定期修改密码有助于保护账号安全</p>
                    
                    <div class="security-form">
                        <div class="form-group">
                            <label class="form-label">旧密码</label>
                            <input type="password" id="old-password" class="form-input" placeholder="请输入当前密码" autocomplete="current-password">
                            <p class="form-error" id="old-password-error"></p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">新密码</label>
                            <input type="password" id="new-password" class="form-input" placeholder="请输入新密码（至少6位）" autocomplete="new-password">
                            <p class="form-error" id="new-password-error"></p>
                        </div>
                        <div class="form-group">
                            <label class="form-label">确认新密码</label>
                            <input type="password" id="confirm-password" class="form-input" placeholder="请再次输入新密码" autocomplete="new-password">
                            <p class="form-error" id="confirm-password-error"></p>
                        </div>
                        
                        <button class="security-btn" id="change-pwd-btn" onclick="changePassword()">
                            <span id="change-pwd-text">确认修改</span>
                            <span id="change-pwd-loading" style="display:none;">修改中...</span>
                        </button>
                        
                        <div class="security-tip">
                            💡 密码建议使用字母、数字和符号的组合，长度不少于6位
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 自定义提示弹窗 -->
    <div id="alert-modal" class="custom-modal-overlay" style="display:none;">
        <div class="custom-modal-box">
            <div class="custom-modal-icon" id="alert-modal-icon">✅</div>
            <div class="custom-modal-message" id="alert-modal-message"></div>
            <button class="custom-modal-btn" onclick="closeAlertModal()">确定</button>
        </div>
    </div>

    <style>
        .security-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }
        .security-card {
            background: #FBE6DA;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .security-card-title {
            font-size: 20px;
            font-weight: 700;
            color: #3D1010;
            margin: 0 0 8px 0;
        }
        .security-card-desc {
            font-size: 14px;
            color: #7a4a3a;
            margin: 0 0 28px 0;
        }
        .security-form .form-group {
            margin-bottom: 20px;
        }
        .security-form .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #7a4a3a;
            margin-bottom: 8px;
        }
        .security-form .form-input {
            width: 100%;
            height: 44px;
            border: 2px solid #e8d0c4;
            border-radius: 10px;
            padding: 0 14px;
            font-size: 15px;
            color: #3D1010;
            background: #FFF9F5;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .security-form .form-input:focus {
            outline: none;
            border-color: #D16023;
            background: #FBE6DA;
        }
        .security-form .form-error {
            font-size: 13px;
            color: #ef4444;
            margin: 6px 0 0 0;
            min-height: 18px;
        }
        .security-btn {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #D16023, #843510);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .security-btn:hover { opacity: 0.9; }
        .security-btn:active { opacity: 0.8; }
        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            padding: 8px 16px;
            background: #FFF9F5;
            border: 2px solid #e8d0c4;
            border-radius: 10px;
            color: #7a4a3a;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .back-btn:hover {
            background: #FBE6DA;
            border-color: #D16023;
        }
        .header { position: relative; }
        .security-tip {
            margin-top: 20px;
            padding: 12px 16px;
            background: rgba(22, 163, 74, 0.15);
            border-radius: 10px;
            font-size: 13px;
            color: #16a34a;
            line-height: 1.5;
        }
        /* 自定义弹窗 */
        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.45); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .custom-modal-box {
            background: #FBE6DA; border-radius: 16px; padding: 32px 28px 24px;
            max-width: 360px; width: 90%; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .custom-modal-icon { font-size: 40px; margin-bottom: 12px; }
        .custom-modal-message { font-size: 16px; color: #3D1010; line-height: 1.6; margin-bottom: 20px; }
        .custom-modal-btn {
            padding: 10px 40px; background: linear-gradient(135deg, #D16023, #843510);
            border: none; border-radius: 10px; color: #fff; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: opacity 0.2s;
        }
        .custom-modal-btn:hover { opacity: 0.9; }
        @media (max-width: 640px) {
            .security-container { padding: 12px; }
            .security-card { padding: 20px; }
        }
    </style>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        window.onload = function() {
            initApp();
        };

        // 自定义弹窗（居中显示，无标题栏）
        var alertModalCallback = null;

        function showAlertModal(message, icon, callback) {
            document.getElementById('alert-modal-message').textContent = message;
            document.getElementById('alert-modal-icon').textContent = icon || '💬';
            document.getElementById('alert-modal').style.display = 'flex';
            alertModalCallback = callback || null;
        }

        function closeAlertModal() {
            document.getElementById('alert-modal').style.display = 'none';
            if (alertModalCallback) {
                var cb = alertModalCallback;
                alertModalCallback = null;
                cb();
            }
        }

        function changePassword() {
            var oldPwd = document.getElementById('old-password').value;
            var newPwd = document.getElementById('new-password').value;
            var confirmPwd = document.getElementById('confirm-password').value;
            var btnText = document.getElementById('change-pwd-text');
            var btnLoading = document.getElementById('change-pwd-loading');
            var btn = document.getElementById('change-pwd-btn');

            // 清除旧错误
            document.getElementById('old-password-error').textContent = '';
            document.getElementById('new-password-error').textContent = '';
            document.getElementById('confirm-password-error').textContent = '';

            // 验证
            if (!oldPwd) {
                document.getElementById('old-password-error').textContent = '请输入旧密码';
                return;
            }
            if (!newPwd || newPwd.length < 6) {
                document.getElementById('new-password-error').textContent = '新密码长度不能少于6位';
                return;
            }
            if (newPwd !== confirmPwd) {
                document.getElementById('confirm-password-error').textContent = '两次输入的新密码不一致';
                return;
            }

            // 禁用按钮
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';

            var userId = getCurrentUserId();
            fetch(API_BASE_URL + '/user/' + userId + '/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    old_password: oldPwd,
                    new_password: newPwd
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';

                if (data.error) {
                    if (data.error.indexOf('旧密码') !== -1) {
                        document.getElementById('old-password-error').textContent = data.error;
                    } else {
                        showAlertModal(data.error, '⚠️');
                    }
                    return;
                }

                showAlertModal('密码修改成功！请使用新密码重新登录', '✅', function() {
                    document.getElementById('old-password').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';
                    logout();
                });
            })
            .catch(function() {
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
                showAlertModal('网络错误，请稍后重试', '❌');
            });
        }
    </script>
</body>
</html>
