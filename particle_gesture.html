<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D粒子手势交互系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#000;color:#fff;overflow:hidden;height:100vh;user-select:none}
canvas{display:block}

#panel{
  position:fixed;top:20px;right:20px;width:280px;
  background:rgba(10,15,30,.88);backdrop-filter:blur(20px);
  border-radius:14px;padding:18px;z-index:200;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  max-height:calc(100vh - 40px);overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.hdr h1{font-size:16px;font-weight:600}

.btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:#e2e8f0;padding:6px 12px;border-radius:7px;cursor:pointer;
  font-size:12px;transition:all .2s;
}
.btn:hover{background:rgba(255,255,255,.1)}
.btn.cam-on{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#f87171}

.sec{margin-bottom:14px}
.stl{font-size:10px;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}

.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mb{
  background:rgba(255,255,255,.02);border:2px solid transparent;
  border-radius:6px;padding:8px 4px;color:#94a3b8;cursor:pointer;
  transition:all .2s;text-align:center;font-size:11px;
}
.mb:hover{background:rgba(255,255,255,.06)}
.mb.on{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.45);color:#38bdf8}

.cr{display:flex;align-items:center;gap:8px}
#cpk{width:32px;height:32px;border:none;border-radius:6px;cursor:pointer;padding:0;background:none}
#cpr{flex:1;height:32px;border-radius:6px;transition:background .3s}

.sw{margin-top:5px}
.sr{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px;color:#64748b}
.sr .v{color:#38bdf8;font-weight:600}
input[type=range]{width:100%;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.06);border-radius:1px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#38bdf8;cursor:pointer}

.sb{background:rgba(0,0,0,.2);border-radius:6px;padding:10px;margin-top:8px}
.si{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px;color:#64748b}
.sv{color:#38bdf8;font-weight:600}

#camWrap{
  position:fixed;bottom:16px;left:16px;z-index:200;
  border-radius:10px;overflow:hidden;
  border:2px solid rgba(255,255,255,.06);
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  background:#000;display:none;
}
#camWrap.on{display:block}
#camVid{width:200px;height:150px;display:block;transform:scaleX(-1);object-fit:cover}
#camCvs{position:absolute;top:0;left:0;width:200px;height:150px;transform:scaleX(-1);pointer-events:none}

#camBtn{position:fixed;bottom:16px;left:232px;z-index:200}

#tips{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.45);backdrop-filter:blur(8px);
  padding:8px 14px;border-radius:8px;font-size:11px;
  z-index:200;border:1px solid rgba(255,255,255,.04);
  text-align:center;line-height:1.5;color:#94a3b8;
}
#tips b{color:#38bdf8}

#loader{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#loader .ring{width:36px;height:36px;border:3px solid rgba(255,255,255,.06);border-top-color:#38bdf8;border-radius:50%;animation:spin .7s linear infinite}
#loader .txt{font-size:13px;color:#64748b}
@keyframes spin{to{transform:rotate(360deg)}}
.off{display:none!important}
</style>
</head>
<body>

<div id="loader"><div class="ring"></div><div class="txt">初始化粒子系统…</div></div>

<!-- 右侧控制面板 -->
<div id="panel">
  <div class="hdr">
    <h1>✦ 粒子手势交互</h1>
    <button class="btn" id="fsBtn">全屏</button>
  </div>

  <div class="sec">
    <div class="stl">模型选择</div>
    <div class="mg">
      <button class="mb on" data-m="heart">❤️ 爱心</button>
      <button class="mb" data-m="flower">🌺 花朵</button>
      <button class="mb" data-m="saturn">🪐 土星</button>
      <button class="mb" data-m="buddha">🙏 佛像</button>
      <button class="mb" data-m="fireworks">🎆 烟花</button>
      <button class="mb" data-m="sphere">🔵 球体</button>
    </div>
  </div>

  <div class="sec">
    <div class="stl">粒子颜色</div>
    <div class="cr">
      <input type="color" id="cpk" value="#38bdf8">
      <div id="cpr"></div>
    </div>
    <div class="sw">
      <div class="sr"><span>发光强度</span><span class="v" id="giV">1.0</span></div>
      <input type="range" id="giS" min="0.3" max="3.0" step="0.1" value="1.0">
    </div>
  </div>

  <div class="sec">
    <div class="stl">粒子参数</div>
    <div class="sw">
      <div class="sr"><span>数量</span><span class="v" id="pcV">4000</span></div>
      <input type="range" id="pcS" min="2000" max="8000" step="200" value="4000">
    </div>
    <div class="sw">
      <div class="sr"><span>大小</span><span class="v" id="psV">2.0</span></div>
      <input type="range" id="psS" min="0.8" max="5" step="0.1" value="2.0">
    </div>
    <div class="sw">
      <div class="sr"><span>过渡速度</span><span class="v" id="tsV">0.06</span></div>
      <input type="range" id="tsS" min="0.02" max="0.15" step="0.01" value="0.06">
    </div>
    <div class="sw">
      <div class="sr"><span>扰动幅度</span><span class="v" id="noV">0.15</span></div>
      <input type="range" id="noS" min="0" max="0.5" step="0.01" value="0.15">
    </div>
  </div>

  <div class="sb">
    <div class="stl">状态</div>
    <div class="si"><span>手势</span><span class="sv" id="gS">未开启</span></div>
    <div class="si"><span>缩放</span><span class="sv" id="gZ">1.00</span></div>
    <div class="si"><span>手数</span><span class="sv" id="gH">0</span></div>
    <div class="si"><span>FPS</span><span class="sv" id="fps">--</span></div>
    <div class="si"><span>延迟</span><span class="sv" id="lat">--</span></div>
  </div>
</div>

<!-- 摄像头 -->
<div id="camWrap">
  <video id="camVid" autoplay playsinline muted></video>
  <canvas id="camCvs" width="640" height="480"></canvas>
</div>
<button class="btn" id="camBtn">📷 开启摄像头</button>

<div id="tips"><b>摄像头</b>：双手张合控制扩散/收缩 &nbsp;|&nbsp; <b>备用</b>：滚轮 / W/S键</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<script>
(function(){
'use strict';

/* ===== 全局状态 ===== */
const S = {
  model:'heart', pCount:5000, pSize:2.5, trans:0.06, noise:0.15,
  color:new THREE.Color('#38bdf8'), glow:1.0,
  gesture:1.0, gestureTarget:1.0,
  camOn:false, mpReady:false, lastGT:0, fps:0, lat:0,
};

let scene,cam3d,renderer,pSys,posArr,colArr,velArr,tgtArr,curArr;
let mpHands,mpCam;
let fpsCnt=0,fpsT=0;
let glowTex; // 发光纹理

/* ===== 生成粒子纹理：一粒一粒的清晰光点 ===== */
function makeGlowTexture(size, color) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const center = size / 2;

  // 粒子纹理设计：小而尖锐的发光点
  // 核心区域紧凑（半径20%），外层光晕短（半径50%就消失）
  // 这样每个粒子看起来是一粒清晰的光点，而不是一团雾

  // 先清空为纯黑
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, size, size);

  // 外层光晕：颜色光晕，范围小，衰减快
  const g1 = ctx.createRadialGradient(center, center, 0, center, center, center * 0.6);
  g1.addColorStop(0,   `rgba(${color.r*255|0},${color.g*255|0},${color.b*255|0},0.6)`);
  g1.addColorStop(0.3, `rgba(${color.r*255|0},${color.g*255|0},${color.b*255|0},0.25)`);
  g1.addColorStop(0.6, `rgba(${color.r*255|0},${color.g*255|0},${color.b*255|0},0.04)`);
  g1.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g1;
  ctx.fillRect(0, 0, size, size);

  // 核心亮点：纯白小圆，非常紧凑 → 每个粒子的清晰中心
  ctx.globalCompositeOperation = 'lighter';
  const g2 = ctx.createRadialGradient(center, center, 0, center, center, center * 0.18);
  g2.addColorStop(0,   'rgba(255,255,255,1)');
  g2.addColorStop(0.5, 'rgba(255,255,255,0.6)');
  g2.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, size, size);

  const tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  return tex;
}

/* ===== 模型生成器 ===== */
// 所有模型坐标范围放大到 ±3~4，让粒子充分铺开
const Models = {
  heart(i,n){
    const t=(i/n)*Math.PI*2;
    // 经典心形曲线，缩放到 ±4 范围
    const x=16*Math.pow(Math.sin(t),3);
    const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    const z=Math.sin(t*3)*1.5;
    // 填充内部：随机偏移半径让爱心有体积感
    const fill = Math.random()*0.6; // 0=轮廓，0.6=内部
    return [x/(4+fill*8), y/(4+fill*8), z/(6)];
  },
  flower(i,n){
    const t=(i/n)*Math.PI*6;
    // 5瓣花朵，半径范围 2~3.5
    const r=2.0+0.8*Math.sin(t*5)+Math.random()*0.4;
    const x=r*Math.cos(t), y=r*Math.sin(t), z=Math.sin(t*2)*0.3+Math.random()*0.15;
    return [x,y,z];
  },
  saturn(i,n){
    const ring=0.25;
    if(i<n*ring){
      // 土星环：半径 3~4
      const t=(i/(n*ring))*Math.PI*2;
      const rr=3.2+0.3*Math.sin(t*20)+Math.random()*0.4;
      return [rr*Math.cos(t), 0.05*Math.sin(t*3), rr*Math.sin(t)];
    }
    // 土星球体：半径 ~2
    const j=i-Math.floor(n*ring), m=n-Math.floor(n*ring);
    const phi=Math.acos(-1+(2*j)/m);
    const theta=Math.sqrt(m*Math.PI)*phi;
    const r=2.0+Math.random()*0.2;
    return [r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi)];
  },
  buddha(i,n){
    const hR=0.15,bR=0.55,basR=0.30;
    if(i<n*hR){
      // 头部圆球，半径1.2，中心y=4
      const j=i,m=Math.floor(n*hR);
      const phi=Math.acos(-1+(2*j)/m),theta=Math.sqrt(m*Math.PI)*phi;
      const r=1.2+Math.random()*0.15;
      return [r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta)+4, r*Math.cos(phi)];
    } else if(i<n*(hR+bR)){
      // 身体：分层椭圆，宽度2~3，高度从3到0
      const j=i-Math.floor(n*hR),m=Math.floor(n*bR);
      const layer=Math.floor(j/(m/12));
      const a=(j%(m/12))/(m/12)*Math.PI*2;
      const w=2.8-(layer/12)*0.5+Math.random()*0.3;
      const h=3.5-layer*0.3;
      return [w*Math.cos(a), h, w*Math.sin(a)*0.5];
    } else {
      // 底座：半径2.5
      const j=i-Math.floor(n*(hR+bR)),m=Math.floor(n*basR);
      const t=(j/m)*Math.PI*2;
      const r=2.5+Math.random()*0.2;
      return [r*Math.cos(t), -0.5+0.1*Math.sin(t*4), r*Math.sin(t)*0.3];
    }
  },
  fireworks(i,n){
    // 5个爆炸中心，每个半径 1.5~2.5
    const centers=5,ci=i%Math.floor(n/centers),cIdx=Math.floor(i/(n/centers));
    const t=(ci/(n/centers))*Math.PI*2;
    const time=performance.now()*0.001,phase=time+cIdx*1.2;
    const speed=1.5+0.8*Math.sin(phase)+Math.random()*0.3;
    const cx=(cIdx-2)*1.5;
    const cy=0.5*Math.sin(cIdx+time);
    return [cx+speed*Math.cos(t)*Math.abs(Math.sin(phase)), cy+speed*Math.sin(t)*Math.abs(Math.sin(phase)), speed*0.8*Math.cos(phase+t)];
  },
  sphere(i,n){
    // 球体半径 3，粒子充分分布
    const phi=Math.acos(-1+(2*i)/n);
    const theta=Math.sqrt(n*Math.PI)*phi;
    const r=3.0+Math.random()*0.15;
    return [r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi)];
  }
};

/* ===== Three.js ===== */
function initThree(){
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x000000,0.025);

  cam3d=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,200);
  cam3d.position.set(0,0,9);

  renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x000000,1);
  // 启用 additive blending 的前提
  renderer.sortObjects = false;
  document.body.appendChild(renderer.domElement);

  buildParticles();
  window.addEventListener('resize',onResize);
}

function buildParticles(){
  const n=S.pCount;
  const geo=new THREE.BufferGeometry();

  posArr=new Float32Array(n*3);
  colArr=new Float32Array(n*3);
  tgtArr=new Float32Array(n*3);
  curArr=new Float32Array(n*3);
  velArr=new Float32Array(n*3); // 速度数组，用于扰动

  for(let i=0;i<n;i++){
    const i3=i*3;
    posArr[i3]=(Math.random()-0.5)*6;
    posArr[i3+1]=(Math.random()-0.5)*6;
    posArr[i3+2]=(Math.random()-0.5)*6;
    curArr[i3]=posArr[i3]; curArr[i3+1]=posArr[i3+1]; curArr[i3+2]=posArr[i3+2];
    velArr[i3]=0; velArr[i3+1]=0; velArr[i3+2]=0;
    colArr[i3]=S.color.r*S.glow;
    colArr[i3+1]=S.color.g*S.glow;
    colArr[i3+2]=S.color.b*S.glow;
  }

  geo.setAttribute('position',new THREE.BufferAttribute(posArr,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colArr,3));

  // 发光纹理
  glowTex=makeGlowTexture(64,S.color);

  const mat=new THREE.PointsMaterial({
    size:S.pSize,
    map:glowTex,
    vertexColors:true,
    transparent:true,
    opacity:0.85,
    sizeAttenuation:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending,  // ★ 关键：叠加混合 → 发光效果
  });

  if(pSys)scene.remove(pSys);
  pSys=new THREE.Points(geo,mat);
  scene.add(pSys);

  setTargets();
  refreshUI();
}

/* ===== 目标位置 ===== */
function setTargets(){
  const n=S.pCount, gen=Models[S.model];
  for(let i=0;i<n;i++){
    const i3=i*3;
    const [x,y,z]=gen(i,n);
    tgtArr[i3]=x*S.gesture;
    tgtArr[i3+1]=y*S.gesture;
    tgtArr[i3+2]=z*S.gesture;
  }
}

/* ===== 更新颜色 ===== */
function updateColors(){
  glowTex=makeGlowTexture(64,S.color);
  pSys.material.map=glowTex;
  pSys.material.needsUpdate=true;

  for(let i=0;i<S.pCount;i++){
    const i3=i*3;
    colArr[i3]=S.color.r*S.glow;
    colArr[i3+1]=S.color.g*S.glow;
    colArr[i3+2]=S.color.b*S.glow;
  }
  pSys.geometry.attributes.color.needsUpdate=true;
}

/* ===== MediaPipe ===== */
async function initMP(){
  try{
    mpHands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`});
    mpHands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
    mpHands.onResults(onHands);
    await mpHands.initialize();
    S.mpReady=true;
    console.log('✅ MediaPipe 就绪');
    document.getElementById('gS').textContent='模型就绪，等待摄像头';
  }catch(e){
    console.warn('⚠ MediaPipe 失败:',e);
    S.mpReady=false;
    document.getElementById('gS').textContent='模型不可用，用键盘/滚轮';
  }
}

function onHands(results){
  const t0=performance.now();
  drawOverlay(results);

  const hands=results.multiHandLandmarks;
  const nh=hands?hands.length:0;
  document.getElementById('gH').textContent=nh;

  if(nh>=2){
    const p1=hands[0][9], p2=hands[1][9];
    const dx=p1.x-p2.x, dy=p1.y-p2.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const minD=0.05,maxD=0.55,minS=0.3,maxS=2.0;
    let s=minS+(dist-minD)/(maxD-minD)*(maxS-minS);
    s=Math.max(minS,Math.min(maxS,s));
    S.gestureTarget=s; S.lastGT=Date.now();
    document.getElementById('gS').textContent='✅ 双手';
    document.getElementById('gZ').textContent=s.toFixed(2);
  } else if(nh===1){
    const h=hands[0],w=h[0];
    const tips=[4,8,12,16,20];
    let avg=0;
    for(const t of tips){const dx2=h[t].x-w.x,dy2=h[t].y-w.y;avg+=Math.sqrt(dx2*dx2+dy2*dy2);}
    avg/=5;
    let s=0.3+(avg-0.05)/(0.2-0.05)*1.7;
    s=Math.max(0.3,Math.min(2.0,s));
    S.gestureTarget=s; S.lastGT=Date.now();
    document.getElementById('gS').textContent='✅ 单手';
    document.getElementById('gZ').textContent=s.toFixed(2);
  } else {
    if(Date.now()-S.lastGT>2000) S.gestureTarget+=(1.0-S.gestureTarget)*0.02;
    document.getElementById('gS').textContent='🔍 寻找手…';
  }

  S.lat=performance.now()-t0;
  document.getElementById('lat').textContent=Math.round(S.lat)+'ms';
}

function drawOverlay(results){
  const cvs=document.getElementById('camCvs');
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  if(!results.multiHandLandmarks)return;

  const conns=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
  for(const lm of results.multiHandLandmarks){
    ctx.strokeStyle='#38bdf8';ctx.lineWidth=2;
    for(const[a,b]of conns){
      ctx.beginPath();ctx.moveTo(lm[a].x*cvs.width,lm[a].y*cvs.height);ctx.lineTo(lm[b].x*cvs.width,lm[b].y*cvs.height);ctx.stroke();
    }
    for(let i=0;i<lm.length;i++){
      ctx.beginPath();ctx.arc(lm[i].x*cvs.width,lm[i].y*cvs.height,i===9?5:3,0,Math.PI*2);
      ctx.fillStyle=i===9?'#fbbf24':'#38bdf8';ctx.fill();
    }
  }
  if(results.multiHandLandmarks.length>=2){
    const p1=results.multiHandLandmarks[0][9],p2=results.multiHandLandmarks[1][9];
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=3;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(p1.x*cvs.width,p1.y*cvs.height);ctx.lineTo(p2.x*cvs.width,p2.y*cvs.height);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#fbbf24';ctx.font='bold 13px sans-serif';
    ctx.fillText(`缩放: ${S.gestureTarget.toFixed(2)}`,((p1.x+p2.x)/2)*cvs.width,((p1.y+p2.y)/2)*cvs.height-10);
  }
}

/* ===== 摄像头 ===== */
async function startCam(){
  const vid=document.getElementById('camVid');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'}});
    vid.srcObject=stream; S.camOn=true;
    document.getElementById('camWrap').classList.add('on');
    const cb=document.getElementById('camBtn');cb.textContent='📷 关闭摄像头';cb.classList.add('cam-on');

    if(S.mpReady){
      mpCam=new Camera(vid,{
        onFrame:async()=>{if(S.camOn&&mpHands)await mpHands.send({image:vid});},
        width:640,height:480,
      });
      mpCam.start();
      document.getElementById('gS').textContent='🔍 检测中…伸出双手';
    } else {
      document.getElementById('gS').textContent='摄像头已开（无手势模型）';
      fallbackDetect(vid);
    }
  }catch(e){
    console.error('摄像头:',e);
    document.getElementById('gS').textContent='❌ 摄像头不可用';
  }
}

function stopCam(){
  const vid=document.getElementById('camVid');
  if(vid.srcObject){vid.srcObject.getTracks().forEach(t=>t.stop());vid.srcObject=null;}
  if(mpCam){mpCam.stop();mpCam=null;}
  S.camOn=false;
  document.getElementById('camWrap').classList.remove('on');
  const cb=document.getElementById('camBtn');cb.textContent='📷 开启摄像头';cb.classList.remove('cam-on');
  document.getElementById('gS').textContent='摄像头已关闭';
  const ctx=document.getElementById('camCvs').getContext('2d');ctx.clearRect(0,0,640,480);
}

function fallbackDetect(vid){
  const c=document.createElement('canvas'),ctx=c.getContext('2d');
  function loop(){
    if(!S.camOn)return;
    c.width=vid.videoWidth||640;c.height=vid.videoHeight||480;
    ctx.drawImage(vid,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height).data;
    let b=0;for(let i=0;i<d.length;i+=160)b+=(d[i]+d[i+1]+d[i+2])/3;
    b/=d.length/160;
    S.gestureTarget=Math.max(0.3,Math.min(2.0,0.4+(b/255)*1.4));
    document.getElementById('gZ').textContent=S.gestureTarget.toFixed(2);
    requestAnimationFrame(loop);
  }
  vid.onloadedmetadata=()=>loop();
}

/* ===== 备用控制 ===== */
function initFallback(){
  document.addEventListener('wheel',e=>{
    e.preventDefault();
    S.gestureTarget=Math.max(0.3,Math.min(2.0,S.gestureTarget+e.deltaY*-0.003));
    if(!S.camOn){document.getElementById('gS').textContent='滚轮';document.getElementById('gZ').textContent=S.gestureTarget.toFixed(2);}
  },{passive:false});

  document.addEventListener('keydown',e=>{
    if(e.key==='w'||e.key==='W')S.gestureTarget=Math.min(S.gestureTarget+0.08,2.0);
    if(e.key==='s'||e.key==='S')S.gestureTarget=Math.max(S.gestureTarget-0.08,0.3);
    if(!S.camOn){document.getElementById('gS').textContent='键盘 W/S';document.getElementById('gZ').textContent=S.gestureTarget.toFixed(2);}
  });

  let td0=0;
  document.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;td0=Math.sqrt(dx*dx+dy*dy);}},{passive:true});
  document.addEventListener('touchmove',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.sqrt(dx*dx+dy*dy);S.gestureTarget=Math.max(0.3,Math.min(2.0,0.3+(d/td0)*0.7));if(!S.camOn){document.getElementById('gS').textContent='触摸';document.getElementById('gZ').textContent=S.gestureTarget.toFixed(2);}}},{passive:true});
}

/* ===== 动画循环 ===== */
function animate(){
  requestAnimationFrame(animate);

  fpsCnt++;
  const now=performance.now();
  if(now-fpsT>=1000){
    S.fps=Math.round(fpsCnt*1000/(now-fpsT));
    document.getElementById('fps').textContent=S.fps;
    fpsCnt=0;fpsT=now;
  }

  // 手势缩放平滑
  S.gesture+=(S.gestureTarget-S.gesture)*0.12;
  setTargets();

  // 粒子运动：平滑过渡 + 随机扰动（让粒子"活"起来）
  const sp=S.trans;
  const ns=S.noise;
  const time=performance.now()*0.001;

  for(let i=0;i<S.pCount;i++){
    const i3=i*3;

    // 扰动：每个粒子有独立的微小振荡
    const nx=Math.sin(time*2+i*0.1)*ns;
    const ny=Math.cos(time*1.5+i*0.15)*ns;
    const nz=Math.sin(time*3+i*0.08)*ns;

    curArr[i3]+=(tgtArr[i3]+nx-curArr[i3])*sp;
    curArr[i3+1]+=(tgtArr[i3+1]+ny-curArr[i3+1])*sp;
    curArr[i3+2]+=(tgtArr[i3+2]+nz-curArr[i3+2])*sp;

    posArr[i3]=curArr[i3];
    posArr[i3+1]=curArr[i3+1];
    posArr[i3+2]=curArr[i3+2];
  }
  pSys.geometry.attributes.position.needsUpdate=true;

  // 微旋转
  pSys.rotation.y+=0.002;
  pSys.rotation.x+=0.0008;

  renderer.render(scene,cam3d);
}

/* ===== UI ===== */
function initUI(){
  document.getElementById('fsBtn').onclick=()=>{
    if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('fsBtn').textContent='退出全屏';}
    else{document.exitFullscreen();document.getElementById('fsBtn').textContent='全屏';}
  };
  document.addEventListener('fullscreenchange',()=>{document.getElementById('fsBtn').textContent=document.fullscreenElement?'退出全屏':'全屏';});

  document.getElementById('camBtn').onclick=()=>{if(S.camOn)stopCam();else startCam();};

  document.querySelectorAll('.mb').forEach(b=>{
    b.onclick=function(){document.querySelectorAll('.mb').forEach(x=>x.classList.remove('on'));this.classList.add('on');S.model=this.dataset.m;setTargets();};
  });

  document.getElementById('cpk').oninput=function(){S.color.set(this.value);updateColors();refreshUI();};
  document.getElementById('giS').oninput=function(){S.glow=parseFloat(this.value);document.getElementById('giV').textContent=S.glow.toFixed(1);updateColors();};
  document.getElementById('pcS').oninput=function(){S.pCount=parseInt(this.value);document.getElementById('pcV').textContent=S.pCount;buildParticles();};
  document.getElementById('psS').oninput=function(){S.pSize=parseFloat(this.value);document.getElementById('psV').textContent=S.pSize.toFixed(1);pSys.material.size=S.pSize;};
  document.getElementById('tsS').oninput=function(){S.trans=parseFloat(this.value);document.getElementById('tsV').textContent=S.trans.toFixed(2);};
  document.getElementById('noS').oninput=function(){S.noise=parseFloat(this.value);document.getElementById('noV').textContent=S.noise.toFixed(3);};
}

function refreshUI(){
  document.getElementById('pcV').textContent=S.pCount;
  document.getElementById('psV').textContent=S.pSize.toFixed(1);
  document.getElementById('giV').textContent=S.glow.toFixed(1);
  document.getElementById('cpr').style.background=S.color.getStyle();
}

function onResize(){
  cam3d.aspect=window.innerWidth/window.innerHeight;
  cam3d.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

/* ===== 启动 ===== */
async function boot(){
  initThree();
  initUI();
  initFallback();
  animate();
  await initMP();
  document.getElementById('loader').classList.add('off');
  console.log('🚀 粒子系统就绪');
}

boot();
})();
</script>
