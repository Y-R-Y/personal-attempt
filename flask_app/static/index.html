<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>小学刷题乐园 - 趣味闯关学习</title>
    <style id="critical-layout">:root{--sidebar-width:240px}body{margin:0;min-height:100vh;background:#f0f4ff}.app-container{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh;width:100%}.sidebar{width:100%;position:sticky;top:0;height:100vh;z-index:100}@media(max-width:1024px){.app-container{grid-template-columns:1fr;grid-template-rows:auto 1fr}.sidebar{height:auto}}</style>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <!-- 成就提示弹窗 -->
    <div id="achievement-toast" class="achievement-toast">
        <div class="achievement-toast-icon" id="achievement-toast-icon">🌟</div>
        <div class="achievement-toast-content">
            <div class="achievement-toast-title">🎉 成就解锁</div>
            <div class="achievement-toast-name" id="achievement-toast-name">新手上路</div>
            <div class="achievement-toast-desc" id="achievement-toast-desc">完成第一次答题</div>
        </div>
    </div>
    
    <div class="app-container">
        <!-- 侧边栏导航 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🎓 刷题乐园</h1>
                <p class="subtitle">趣味闯关 · 快乐学习</p>
            </div>
            
            <nav class="sidebar-menu">
                <a href="index.html" class="menu-item active">
                    <span class="menu-item-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="level.html?subject=math" class="menu-item">
                    <span class="menu-item-icon">🔢</span>
                    <span>数学</span>
                </a>
                <a href="level.html?subject=chinese" class="menu-item">
                    <span class="menu-item-icon">📖</span>
                    <span>语文</span>
                </a>
                <a href="level.html?subject=english" class="menu-item">
                    <span class="menu-item-icon">🔤</span>
                    <span>英语</span>
                </a>
                <a href="level.html?subject=science" class="menu-item">
                    <span class="menu-item-icon">🔬</span>
                    <span>科学</span>
                </a>
                <a href="level.html?subject=history" class="menu-item">
                    <span class="menu-item-icon">📜</span>
                    <span>历史</span>
                </a>
                <a href="leaderboard.html" class="menu-item">
                    <span class="menu-item-icon">🏆</span>
                    <span>排行榜</span>
                </a>
                <a href="wrong-book.html" class="menu-item">
                    <span class="menu-item-icon">📝</span>
                    <span>错题本</span>
                </a>
                <a href="achievements.html" class="menu-item">
                    <span class="menu-item-icon">🏆</span>
                    <span>成就榜</span>
                </a>
                <a href="ai-assistant.html" class="menu-item">
                    <span class="menu-item-icon">🤖</span>
                    <span>AI学习助手</span>
                </a>
                <a href="vip.html" class="menu-item">
                    <span class="menu-item-icon">👑</span>
                    <span>VIP会员</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="profile.html" class="menu-item" style="margin-bottom: 15px;">
                    <span class="menu-item-icon">👤</span>
                    <span>我的</span>
                </a>
                <button class="logout-btn" id="logout-btn" onclick="logout()" style="display:none;">🚪 退出登录</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="header">
                <h1>🎓 小学刷题乐园</h1>
                <p class="subtitle">趣味闯关 · 快乐学习</p>
            </div>
            
            <div class="avatar-section">
                <div class="avatar" id="user-avatar"><img src="images/default-avatar.webp" alt="默认头像"></div>
                <div class="student-info">
                    <div class="welcome-text" id="welcome-text"></div>
                    <div class="student-name-display" id="student-name">新学生</div>
                    <div class="user-info-row">
                        <div class="level-badge">
                            <span>⭐ 等级：</span>
                            <span id="student-level">1</span>
                        </div>
                        <div id="login-status" style="font-size:13px; color:var(--text-secondary);"></div>
                    </div>
                </div>
                
                <!-- 每日任务卡片 -->
                <div id="daily-task-card" class="daily-task-card">
                    <div class="task-header">
                        <span>📅 今日任务</span>
                        <span class="task-status" id="task-status-text">加载中...</span>
                    </div>
                    <div class="task-progress">
                        <div class="progress-bar" id="task-progress-bar" style="width: 0%"></div>
                    </div>
                    <div class="task-info" id="task-info-text">
                        已完成 0 / 10 题
                    </div>
                </div>
            </div>

            <div class="stats-panel">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" id="total-questions">0</div>
                    <div class="stat-label">总答题数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="correct-count">0</div>
                    <div class="stat-label">答对题目</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-value" id="accuracy-rate">0%</div>
                    <div class="stat-label">正确率</div>
                </div>
            </div>

            <div class="subject-select">
                <h2>选择科目</h2>
                <div class="subject-buttons">
                    <a href="level.html?subject=math" class="subject-btn math">
                        <span class="subject-icon">🔢</span>
                        <span>数学</span>
                    </a>
                    <a href="level.html?subject=chinese" class="subject-btn chinese">
                        <span class="subject-icon">📖</span>
                        <span>语文</span>
                    </a>
                    <a href="level.html?subject=english" class="subject-btn english">
                        <span class="subject-icon">🔤</span>
                        <span>英语</span>
                    </a>
                    <a href="level.html?subject=science" class="subject-btn science">
                        <span class="subject-icon">🔬</span>
                        <span>科学</span>
                    </a>
                    <a href="level.html?subject=history" class="subject-btn history">
                        <span class="subject-icon">📜</span>
                        <span>历史</span>
                    </a>
                </div>
            </div>

            <div class="menu-buttons">
                <a href="wrong-book.html" class="menu-btn">
                    <span>📝</span> 错题本
                </a>
                <a href="achievements.html" class="menu-btn">
                    <span>🏆</span> 成就榜
                </a>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        // 初始化首页
        window.onload = function() {
            initApp();
        };
    </script>
</body>
</html>
